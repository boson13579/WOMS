# Smart Order Management — local development stack.
#
# Usage:
#   cp .env.example .env       # first time — fill in real secrets
#   docker compose up -d       # start db + redis + backend + worker + frontend
#   docker compose ps          # see health of every service
#   docker compose logs -f     # tail JSON logs (already structlog-formatted)
#
# Service responsibilities mirror PRD §2:
#   db        — PostgreSQL 15, sole source of truth (ACID, JSONB)
#   redis     — Celery broker + result backend
#   backend   — FastAPI app (uvicorn)
#   worker    — Celery worker for non-blocking scheduling jobs
#   frontend  — Vite dev server with HMR

name: smart-order

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-smart_order}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-smart_order}" ]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-smart_order}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8000/api/v1/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: [ "celery", "-A", "app.workers.celery_app", "worker", "--loglevel=INFO" ]
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-smart_order}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      # Bind-mount source for HMR; node_modules is kept inside the container
      # to avoid Windows ↔ Linux symlink/permission churn.
      - ./frontend:/app
      - /app/node_modules

  adminer:
    image: adminer
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "8080:8080"
    depends_on:
      db: { condition: service_healthy }

volumes:
  db_data:
  redis_data:
